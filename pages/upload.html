<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IFC アップロード - TALO積算ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
h1 {
  font-size: 24px;
  margin-bottom: 8px;
  color: #58a6ff;
}
.subtitle {
  color: #8b949e;
  margin-bottom: 32px;
  font-size: 14px;
}

/* Token setup */
.token-section {
  width: 100%;
  max-width: 600px;
  margin-bottom: 24px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px;
}
.token-section summary {
  cursor: pointer;
  color: #8b949e;
  font-size: 13px;
}
.token-section summary:hover { color: #58a6ff; }
.token-input-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.token-input-row input {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #e6edf3;
  padding: 8px 12px;
  font-size: 13px;
  font-family: monospace;
}
.token-input-row button {
  background: #238636;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  white-space: nowrap;
}
.token-input-row button:hover { background: #2ea043; }
.token-status {
  margin-top: 8px;
  font-size: 12px;
  color: #3fb950;
}
.token-status.error { color: #f85149; }

/* Drop zone */
.drop-zone {
  width: 100%;
  max-width: 600px;
  border: 2px dashed #30363d;
  border-radius: 12px;
  padding: 60px 40px;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
  background: #161b22;
}
.drop-zone.dragover {
  border-color: #58a6ff;
  background: #1c2333;
  transform: scale(1.02);
}
.drop-zone.disabled {
  opacity: 0.5;
  pointer-events: none;
}
.drop-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.drop-text {
  font-size: 18px;
  color: #e6edf3;
  margin-bottom: 8px;
}
.drop-hint {
  color: #8b949e;
  font-size: 13px;
}
.drop-zone input[type="file"] {
  display: none;
}

/* Progress */
.progress-section {
  width: 100%;
  max-width: 600px;
  margin-top: 24px;
  display: none;
}
.progress-section.active { display: block; }
.progress-bar-container {
  background: #21262d;
  border-radius: 6px;
  overflow: hidden;
  height: 8px;
  margin-bottom: 12px;
}
.progress-bar {
  height: 100%;
  background: #58a6ff;
  border-radius: 6px;
  transition: width 0.3s;
  width: 0%;
}
.progress-bar.success { background: #3fb950; }
.progress-bar.error { background: #f85149; }
.status-text {
  font-size: 14px;
  color: #8b949e;
}
.status-text .step { color: #e6edf3; }

/* Result list */
.results {
  width: 100%;
  max-width: 600px;
  margin-top: 24px;
}
.result-item {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.result-item .icon { font-size: 24px; }
.result-item .info { flex: 1; }
.result-item .name { font-size: 14px; font-weight: 600; }
.result-item .detail { font-size: 12px; color: #8b949e; margin-top: 2px; }
.result-item a {
  color: #58a6ff;
  text-decoration: none;
  font-size: 13px;
  padding: 6px 12px;
  border: 1px solid #30363d;
  border-radius: 6px;
}
.result-item a:hover {
  background: #1c2333;
  border-color: #58a6ff;
}

/* Existing viewers */
.viewers-section {
  width: 100%;
  max-width: 600px;
  margin-top: 32px;
}
.viewers-section h2 {
  font-size: 16px;
  color: #8b949e;
  margin-bottom: 12px;
  border-bottom: 1px solid #21262d;
  padding-bottom: 8px;
}
.viewer-link {
  display: block;
  color: #58a6ff;
  text-decoration: none;
  padding: 10px 0;
  border-bottom: 1px solid #21262d;
  font-size: 15px;
}
.viewer-link:hover { color: #79c0ff; }
.viewer-link .size {
  color: #8b949e;
  font-size: 12px;
  margin-left: 8px;
}

/* Footer */
.footer {
  margin-top: auto;
  padding-top: 40px;
  color: #484f58;
  font-size: 12px;
}
</style>
</head>
<body>

<h1>TALO 積算ツール</h1>
<p class="subtitle">IFCファイルをドラッグ＆ドロップして廻り縁拾い3Dビューアを生成</p>

<!-- Token setup -->
<details class="token-section" id="tokenSection">
  <summary>⚙️ 初回設定（GitHubトークン）</summary>
  <p style="margin-top:12px; font-size:13px; color:#8b949e;">
    GitHubのPersonal Access Tokenを入力してください。<br>
    トークンは<strong>このブラウザにのみ</strong>保存されます。
  </p>
  <div class="token-input-row">
    <input type="password" id="tokenInput" placeholder="github_pat_xxxx...">
    <button onclick="saveToken()">保存</button>
  </div>
  <div class="token-status" id="tokenStatus"></div>
</details>

<!-- Drop zone -->
<div class="drop-zone" id="dropZone">
  <div class="drop-icon">📂</div>
  <div class="drop-text">IFCファイルをここにドロップ</div>
  <div class="drop-hint">またはクリックしてファイルを選択（.ifc）</div>
  <input type="file" id="fileInput" accept=".ifc">
</div>

<!-- Progress -->
<div class="progress-section" id="progressSection">
  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status-text" id="statusText"></div>
</div>

<!-- Results -->
<div class="results" id="results"></div>

<!-- Existing viewers -->
<div class="viewers-section" id="viewersSection" style="display:none;">
  <h2>生成済みビューア</h2>
  <div id="viewersList"></div>
</div>

<div class="footer">TALO International Inc. — Powered by GitHub Actions</div>

<script>
const REPO_OWNER = 'adachitalo';
const REPO_NAME = 'talosekisan';
const BRANCH = 'main';
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;

// Token management
function getToken() {
  return localStorage.getItem('gh_token_talosekisan') || '';
}

function saveToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  localStorage.setItem('gh_token_talosekisan', token);
  document.getElementById('tokenStatus').textContent = '✓ トークンを保存しました';
  document.getElementById('tokenStatus').className = 'token-status';
  checkToken();
}

async function checkToken() {
  const token = getToken();
  if (!token) {
    document.getElementById('tokenSection').open = true;
    document.getElementById('dropZone').classList.add('disabled');
    return false;
  }
  try {
    const res = await fetch(API_BASE, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
      document.getElementById('dropZone').classList.remove('disabled');
      document.getElementById('tokenSection').open = false;
      loadExistingViewers();
      return true;
    } else {
      document.getElementById('tokenStatus').textContent = '✗ トークンが無効です';
      document.getElementById('tokenStatus').className = 'token-status error';
      document.getElementById('tokenSection').open = true;
      document.getElementById('dropZone').classList.add('disabled');
      return false;
    }
  } catch (e) {
    document.getElementById('tokenStatus').textContent = '✗ 接続エラー';
    document.getElementById('tokenStatus').className = 'token-status error';
    return false;
  }
}

// File upload via GitHub API
async function uploadFile(file) {
  const token = getToken();
  if (!token) {
    alert('先にGitHubトークンを設定してください');
    return;
  }

  const fileName = file.name;
  const filePath = `ifc/${fileName}`;

  showProgress(true);
  updateStatus('📖 ファイルを読み込み中...', 10);

  try {
    // Read file as base64
    const base64 = await readFileAsBase64(file);
    updateStatus('📤 GitHubにアップロード中...', 30);

    // Check if file already exists (to get SHA for update)
    let sha = null;
    try {
      const existRes = await fetch(`${API_BASE}/contents/${filePath}?ref=${BRANCH}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (existRes.ok) {
        const existData = await existRes.json();
        sha = existData.sha;
      }
    } catch (e) { /* file doesn't exist yet, that's fine */ }

    // Upload file via Contents API
    const body = {
      message: `Upload ${fileName}`,
      content: base64,
      branch: BRANCH
    };
    if (sha) body.sha = sha;

    const uploadRes = await fetch(`${API_BASE}/contents/${filePath}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!uploadRes.ok) {
      const err = await uploadRes.json();
      throw new Error(err.message || 'アップロードに失敗しました');
    }

    updateStatus('⚙️ GitHub Actions を起動中...', 60);

    // Wait a moment for Actions to trigger
    await sleep(3000);
    updateStatus('🔨 IFC処理中（約30秒）...', 70);

    // Poll for workflow completion
    const success = await waitForWorkflow(fileName);

    if (success) {
      updateStatus('✅ 完了！', 100, 'success');
      const baseName = fileName.replace('.ifc', '');
      addResult(fileName, baseName);
      loadExistingViewers();
    } else {
      updateStatus('⚠️ ワークフローがタイムアウトしました。Actionsタブを確認してください。', 100, 'error');
    }

  } catch (err) {
    updateStatus(`❌ エラー: ${err.message}`, 100, 'error');
    console.error(err);
  }
}

async function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function waitForWorkflow(fileName, maxWait = 600000) {
  const token = getToken();
  const startTime = Date.now();

  while (Date.now() - startTime < maxWait) {
    await sleep(10000);

    try {
      const res = await fetch(`${API_BASE}/actions/runs?branch=${BRANCH}&per_page=5`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) continue;

      const data = await res.json();
      const runs = data.workflow_runs || [];

      // Find the most recent run
      for (const run of runs) {
        if (run.status === 'completed' && run.conclusion === 'success') {
          // Check if this run was triggered after our upload
          const runTime = new Date(run.created_at).getTime();
          if (runTime > startTime - 10000) {
            return true;
          }
        }
        if (run.status === 'completed' && run.conclusion === 'failure') {
          const runTime = new Date(run.created_at).getTime();
          if (runTime > startTime - 10000) {
            return false;
          }
        }
      }

      const elapsed = Math.round((Date.now() - startTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      const timeStr = mins > 0 ? `${mins}分${secs}秒` : `${elapsed}秒`;
      updateStatus(`🔨 IFC処理中... (${timeStr}経過)`, 70 + Math.min(25, elapsed / 6));
    } catch (e) {
      console.warn('Polling error:', e);
    }
  }
  return false;
}

async function loadExistingViewers() {
  const token = getToken();
  if (!token) return;

  try {
    // Check for IFC files in repo
    const res = await fetch(`${API_BASE}/contents/ifc?ref=${BRANCH}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    const section = document.getElementById('viewersSection');
    const list = document.getElementById('viewersList');

    if (res.ok) {
      const files = await res.json();
      const ifcFiles = files.filter(f => f.name.endsWith('.ifc'));
      if (ifcFiles.length === 0) {
        section.style.display = 'none';
        return;
      }

      list.innerHTML = '';
      const baseUrl = `https://${REPO_OWNER}.github.io/${REPO_NAME}`;
      for (const f of ifcFiles) {
        const baseName = f.name.replace('.ifc', '');
        const sizeMB = (f.size / 1024 / 1024).toFixed(1);
        const a = document.createElement('a');
        a.className = 'viewer-link';
        a.href = `${baseUrl}/${baseName}.html`;
        a.target = '_blank';
        a.innerHTML = `📊 ${baseName} <span class="size">(${sizeMB} MB)</span>`;
        list.appendChild(a);
      }
      section.style.display = 'block';
    } else {
      // No ifc folder yet - check root for .ifc files
      const rootRes = await fetch(`${API_BASE}/contents/?ref=${BRANCH}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (rootRes.ok) {
        const rootFiles = await rootRes.json();
        const ifcFiles = rootFiles.filter(f => f.name.endsWith('.ifc'));
        if (ifcFiles.length > 0) {
          list.innerHTML = '';
          const baseUrl = `https://${REPO_OWNER}.github.io/${REPO_NAME}`;
          for (const f of ifcFiles) {
            const baseName = f.name.replace('.ifc', '');
            const sizeMB = (f.size / 1024 / 1024).toFixed(1);
            const a = document.createElement('a');
            a.className = 'viewer-link';
            a.href = `${baseUrl}/${baseName}.html`;
            a.target = '_blank';
            a.innerHTML = `📊 ${baseName} <span class="size">(${sizeMB} MB)</span>`;
            list.appendChild(a);
          }
          section.style.display = 'block';
        }
      }
    }
  } catch (e) {
    console.warn('Failed to load viewers:', e);
  }
}

// UI helpers
function showProgress(show) {
  document.getElementById('progressSection').className = show ? 'progress-section active' : 'progress-section';
}
function updateStatus(text, percent, type) {
  document.getElementById('statusText').innerHTML = text;
  const bar = document.getElementById('progressBar');
  bar.style.width = percent + '%';
  bar.className = 'progress-bar' + (type ? ' ' + type : '');
}
function addResult(fileName, baseName) {
  const baseUrl = `https://${REPO_OWNER}.github.io/${REPO_NAME}`;
  const div = document.createElement('div');
  div.className = 'result-item';
  div.innerHTML = `
    <div class="icon">✅</div>
    <div class="info">
      <div class="name">${fileName}</div>
      <div class="detail">3Dビューアを生成しました</div>
    </div>
    <a href="${baseUrl}/${baseName}.html" target="_blank">ビューアを開く →</a>
  `;
  document.getElementById('results').prepend(div);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Drag & Drop handlers
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => {
  if (!dropZone.classList.contains('disabled')) fileInput.click();
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.ifc'));
  if (files.length === 0) {
    alert('.ifc ファイルを選択してください');
    return;
  }
  // Process first file (could extend to multiple)
  uploadFile(files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    uploadFile(fileInput.files[0]);
  }
});

// Init
checkToken();
</script>
</body>
</html>
