name: IFC → 廻り縁拾い3Dビューア

on:
  push:
    paths:
      - '*.ifc'
      - 'ifc/**'
  workflow_dispatch:
    inputs:
      ifc_file:
        description: 'IFCファイル名（例: ie4d1_2023.ifc）'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Find IFC files
        id: find-ifc
        run: |
          # workflow_dispatch で指定されたファイル、またはリポジトリ内の全IFC
          if [ -n "${{ github.event.inputs.ifc_file }}" ]; then
            echo "files=${{ github.event.inputs.ifc_file }}" >> $GITHUB_OUTPUT
          else
            FILES=$(find . -name '*.ifc' -not -path './.git/*' | tr '\n' ' ')
            echo "files=$FILES" >> $GITHUB_OUTPUT
          fi

      - name: Process IFC files
        run: |
          mkdir -p output
          IFC_FILES="${{ steps.find-ifc.outputs.files }}"

          if [ -z "$IFC_FILES" ]; then
            echo "::error::IFCファイルが見つかりません"
            exit 1
          fi

          FIRST=true
          INDEX_LINKS=""

          for ifc in $IFC_FILES; do
            if [ ! -f "$ifc" ]; then
              echo "::warning::ファイルが見つかりません: $ifc"
              continue
            fi

            BASENAME=$(basename "$ifc" .ifc)
            OUTPUT="output/${BASENAME}.html"

            echo "=== Processing: $ifc → $OUTPUT ==="
            python scripts/build_mawari_buchi_viewer.py "$ifc" "$OUTPUT"

            # 最初のファイルをindex.htmlとしてもコピー
            if [ "$FIRST" = true ]; then
              cp "$OUTPUT" output/index.html
              FIRST=false
            fi

            INDEX_LINKS="${INDEX_LINKS}<li><a href='${BASENAME}.html'>${BASENAME}</a></li>"
          done

          # 複数ファイルの場合はインデックスページを生成
          COUNT=$(echo $IFC_FILES | wc -w)
          if [ "$COUNT" -gt 1 ]; then
            cat > output/index.html << HTMLEOF
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>廻り縁拾い 3Dビューア一覧</title>
          <style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:0 20px}
          h1{color:#333}a{color:#0066cc;text-decoration:none}a:hover{text-decoration:underline}
          li{margin:8px 0;font-size:18px}</style></head>
          <body><h1>廻り縁拾い 3Dビューア</h1>
          <ul>${INDEX_LINKS}</ul>
          <p style="color:#888;font-size:12px">Generated by GitHub Actions</p>
          </body></html>
          HTMLEOF
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
