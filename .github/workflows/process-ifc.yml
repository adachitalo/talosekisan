name: IFC → 積算ツール（廻り縁・巾木・額縁・垂木・根太・部材一覧Excel・キット積算）

on:
  push:
    paths:
      - '*.ifc'
      - 'ifc/**'
      - 'pages/**'
      - 'scripts/**'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      ifc_file:
        description: 'IFCファイル名（例: ifc/ie4d1_2023.ifc）空=全ファイル再生成'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached outputs
        id: cache-outputs
        uses: actions/cache@v4
        with:
          path: output-cache
          key: ifc-v2-${{ hashFiles('scripts/**') }}-${{ hashFiles('ifc/*.ifc', '*.ifc') }}
          restore-keys: |
            ifc-v2-${{ hashFiles('scripts/**') }}-
            ifc-v2-

      - name: Determine which IFC files to process
        id: find-ifc
        run: |
          mkdir -p output-cache

          # workflow_dispatch で指定された場合
          if [ -n "${{ github.event.inputs.ifc_file }}" ]; then
            echo "files=${{ github.event.inputs.ifc_file }}" >> $GITHUB_OUTPUT
            echo "mode=specified" >> $GITHUB_OUTPUT
            exit 0
          fi

          # スクリプト変更時は全ファイル再生成
          SCRIPT_CHANGED=$(git diff --name-only HEAD~1 HEAD -- scripts/ requirements.txt 2>/dev/null || echo "")
          if [ -n "$SCRIPT_CHANGED" ]; then
            FILES=$(find . -name '*.ifc' -not -path './.git/*' | tr '\n' ' ')
            echo "files=$FILES" >> $GITHUB_OUTPUT
            echo "mode=all (script changed)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 変更されたIFCファイルのみ
          CHANGED_IFC=$(git diff --name-only HEAD~1 HEAD -- '*.ifc' 'ifc/*.ifc' 2>/dev/null || echo "")
          if [ -n "$CHANGED_IFC" ]; then
            echo "files=$CHANGED_IFC" >> $GITHUB_OUTPUT
            echo "mode=changed only" >> $GITHUB_OUTPUT
          else
            echo "files=" >> $GITHUB_OUTPUT
            echo "mode=pages-only (no IFC processing)" >> $GITHUB_OUTPUT
          fi

      - name: Process IFC files (all tools)
        run: |
          mkdir -p output
          echo "Processing mode: ${{ steps.find-ifc.outputs.mode }}"

          # キャッシュから既存出力を復元
          if [ -d output-cache ]; then
            cp -r output-cache/* output/ 2>/dev/null || true
            echo "Restored cached outputs: $(ls output/ 2>/dev/null | wc -l) files"
          fi

          IFC_FILES="${{ steps.find-ifc.outputs.files }}"

          if [ -n "$IFC_FILES" ]; then
            for ifc in $IFC_FILES; do
              if [ ! -f "$ifc" ]; then
                echo "::warning::ファイルが見つかりません: $ifc"
                continue
              fi

              BASENAME=$(basename "$ifc" .ifc)
              echo ""
              echo "========================================="
              echo "  Processing: $BASENAME"
              echo "========================================="

              # 6スクリプトを並列実行（IFC解析が重いため）
              python scripts/build_mawari_buchi_viewer.py "$ifc" "output/${BASENAME}.html" &
              PID1=$!
              python scripts/build_habaki_viewer.py "$ifc" "output/habaki_${BASENAME}.html" &
              PID2=$!
              python scripts/extract_ifc.py "$ifc" "output/buzai_${BASENAME}.xlsx" "output/kit_${BASENAME}.xlsx" &
              PID3=$!
              python scripts/build_gakubuchi_viewer.py "$ifc" "output/gakubuchi_${BASENAME}.html" &
              PID4=$!
              python scripts/build_taruki_viewer.py "$ifc" "output/taruki_${BASENAME}.html" &
              PID5=$!
              python scripts/build_neda_viewer.py "$ifc" "output/neda_${BASENAME}.html" &
              PID6=$!

              # 全完了を待つ
              wait $PID1 || echo "::warning::廻り縁拾い失敗: $BASENAME"
              wait $PID2 || echo "::warning::巾木拾い失敗: $BASENAME"
              wait $PID3 || echo "::warning::部材一覧Excel失敗: $BASENAME"
              wait $PID4 || echo "::warning::額縁拾い失敗: $BASENAME"
              wait $PID5 || echo "::warning::垂木拾い失敗: $BASENAME"
              wait $PID6 || echo "::warning::根太拾い失敗: $BASENAME"

              # 廻り縁・巾木・額縁の集計JSONを部材一覧Excelに統合
              if [ -f "output/buzai_${BASENAME}.xlsx" ]; then
                python scripts/add_sheets_to_excel.py "output/buzai_${BASENAME}.xlsx" || \
                  echo "::warning::Excel統合失敗: $BASENAME"
              fi

            done
          else
            echo "No IFC files to process (using cached outputs)"
          fi

          # 処理結果をキャッシュに保存
          mkdir -p output-cache
          cp -r output/* output-cache/ 2>/dev/null || true

      - name: Build site
        run: |
          # 静的ページをコピー
          cp pages/upload.html output/upload.html 2>/dev/null || true
          for f in pages/*.html; do
            [ -f "$f" ] || continue
            FNAME=$(basename "$f")
            [ "$FNAME" = "upload.html" ] && continue
            cp "$f" "output/$FNAME"
          done

          # IFCモデル一覧を動的に構築
          # 旧ファイル名(mawari_*)がキャッシュに残っている場合は削除
          rm -f output/mawari_*.html 2>/dev/null || true

          MODEL_CARDS=""
          for viewer in output/*.html; do
            [ -f "$viewer" ] || continue
            VNAME=$(basename "$viewer" .html)
            # habaki_, gakubuchi_, upload, index, 額縁拾い等はスキップ
            echo "$VNAME" | grep -qE '^(habaki_|gakubuchi_|gakubuchi|taruki_|neda_|upload|index)' && continue

            BASENAME="$VNAME"
            LINKS="<a href='${BASENAME}.html'>廻り縁拾い</a>"
            if [ -f "output/habaki_${BASENAME}.html" ]; then
              LINKS="${LINKS} | <a href='habaki_${BASENAME}.html'>巾木拾い</a>"
            fi
            if [ -f "output/gakubuchi_${BASENAME}.html" ]; then
              LINKS="${LINKS} | <a href='gakubuchi_${BASENAME}.html'>額縁拾い3D</a>"
            fi
            if [ -f "output/taruki_${BASENAME}.html" ]; then
              LINKS="${LINKS} | <a href='taruki_${BASENAME}.html'>垂木拾い</a>"
            fi
            if [ -f "output/neda_${BASENAME}.html" ]; then
              LINKS="${LINKS} | <a href='neda_${BASENAME}.html'>根太拾い</a>"
            fi
            if [ -f "output/buzai_${BASENAME}.xlsx" ]; then
              LINKS="${LINKS} | <a href='buzai_${BASENAME}.xlsx'>📊 部材一覧Excel</a>"
            fi
            if [ -f "output/kit_${BASENAME}.xlsx" ]; then
              LINKS="${LINKS} | <a href='kit_${BASENAME}.xlsx'>💰 キット積算Excel</a>"
            fi

            MODEL_CARDS="${MODEL_CARDS}<div class='model-card'><h3>${BASENAME}</h3><div class='links'>${LINKS}</div></div>"
          done

          cat > output/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>TALO 積算ツール</title>
          <style>
          body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans",sans-serif;
          background:#0d1117;color:#e6edf3;max-width:700px;margin:40px auto;padding:0 20px}
          h1{color:#58a6ff;margin-bottom:4px}
          .sub{color:#8b949e;margin-bottom:24px;font-size:14px}
          .upload-btn{display:inline-block;background:#238636;color:#fff;text-decoration:none;
          padding:10px 20px;border-radius:6px;font-size:15px;margin-bottom:8px}
          .upload-btn:hover{background:#2ea043}
          .tool-btn{display:inline-block;background:#1f6feb;color:#fff;text-decoration:none;
          padding:10px 20px;border-radius:6px;font-size:15px;margin-bottom:24px;margin-left:8px}
          .tool-btn:hover{background:#388bfd}
          h2{font-size:16px;color:#8b949e;border-bottom:1px solid #21262d;padding-bottom:8px;margin-top:24px}
          .model-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}
          .model-card h3{color:#58a6ff;margin-bottom:8px;font-size:18px}
          .model-card .links{font-size:14px}
          .model-card a{color:#58a6ff;text-decoration:none}
          .model-card a:hover{text-decoration:underline}
          .footer{color:#484f58;font-size:12px;margin-top:40px}
          </style></head>
          <body>
          <h1>TALO 積算ツール</h1>
          <p class="sub">IFCファイルから廻り縁拾い・巾木拾い・額縁拾い・垂木拾い・根太拾い・部材一覧Excel・キット積算Excelを自動生成</p>
          <a href="upload.html" class="upload-btn">📤 IFCファイルをアップロード</a>
          <a href="gakubuchi.html" class="tool-btn">🪟 額縁拾い・木取り計算</a>
          <h2>生成済みモデル</h2>
          HTMLEOF

          if [ -n "$MODEL_CARDS" ]; then
            echo "$MODEL_CARDS" >> output/index.html
          else
            echo "<p style='color:#8b949e'>まだモデルがありません。IFCファイルをアップロードしてください。</p>" >> output/index.html
          fi

          cat >> output/index.html << 'HTMLEOF'
          <p class="footer">TALO International Inc. — Powered by GitHub Actions</p>
          </body></html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
