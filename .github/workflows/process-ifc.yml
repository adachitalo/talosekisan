name: IFC → 積算ツール（廻り縁・巾木・額縁・垂木・根太・部材一覧Excel・キット積算）

on:
  push:
    paths:
      - '*.ifc'
      - 'ifc/**'
      - 'pages/**'
      - 'scripts/**'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      ifc_file:
        description: 'IFCファイル名（例: ifc/ie4d1_2023.ifc）空=全ファイル再生成'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached outputs
        id: cache-outputs
        uses: actions/cache@v4
        with:
          path: output-cache
          key: ifc-v2-${{ hashFiles('scripts/**') }}-${{ hashFiles('ifc/*.ifc', '*.ifc') }}
          restore-keys: |
            ifc-v2-${{ hashFiles('scripts/**') }}-
            ifc-v2-

      - name: Determine which IFC files to process
        id: find-ifc
        run: |
          mkdir -p output-cache

          # workflow_dispatch で指定された場合
          if [ -n "${{ github.event.inputs.ifc_file }}" ]; then
            echo "files=${{ github.event.inputs.ifc_file }}" >> $GITHUB_OUTPUT
            echo "mode=specified" >> $GITHUB_OUTPUT
            exit 0
          fi

          # スクリプト変更時は全ファイル再生成
          SCRIPT_CHANGED=$(git diff --name-only HEAD~1 HEAD -- scripts/ requirements.txt 2>/dev/null || echo "")
          if [ -n "$SCRIPT_CHANGED" ]; then
            FILES=$(find . -name '*.ifc' -not -path './.git/*' | tr '\n' ' ')
            echo "files=$FILES" >> $GITHUB_OUTPUT
            echo "mode=all (script changed)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 変更されたIFCファイルのみ
          CHANGED_IFC=$(git diff --name-only HEAD~1 HEAD -- '*.ifc' 'ifc/*.ifc' 2>/dev/null || echo "")
          if [ -n "$CHANGED_IFC" ]; then
            echo "files=$CHANGED_IFC" >> $GITHUB_OUTPUT
            echo "mode=changed only" >> $GITHUB_OUTPUT
          else
            echo "files=" >> $GITHUB_OUTPUT
            echo "mode=pages-only (no IFC processing)" >> $GITHUB_OUTPUT
          fi

      - name: Process IFC files (all tools)
        run: |
          mkdir -p output
          echo "Processing mode: ${{ steps.find-ifc.outputs.mode }}"

          # キャッシュから既存出力を復元
          if [ -d output-cache ]; then
            cp -r output-cache/* output/ 2>/dev/null || true
            echo "Restored cached outputs: $(ls output/ 2>/dev/null | wc -l) files"
          fi

          IFC_FILES="${{ steps.find-ifc.outputs.files }}"

          if [ -n "$IFC_FILES" ]; then
            for ifc in $IFC_FILES; do
              if [ ! -f "$ifc" ]; then
                echo "::warning::ファイルが見つかりません: $ifc"
                continue
              fi

              BASENAME=$(basename "$ifc" .ifc)
              echo ""
              echo "========================================="
              echo "  Processing: $BASENAME"
              echo "========================================="

              # 6スクリプトを並列実行（IFC解析が重いため）
              python scripts/build_mawari_buchi_viewer.py "$ifc" "output/${BASENAME}.html" &
              PID1=$!
              python scripts/build_habaki_viewer.py "$ifc" "output/habaki_${BASENAME}.html" &
              PID2=$!
              python scripts/extract_ifc.py "$ifc" "output/buzai_${BASENAME}.xlsx" "output/kit_${BASENAME}.xlsx" &
              PID3=$!
              python scripts/build_gakubuchi_viewer.py "$ifc" "output/gakubuchi_${BASENAME}.html" &
              PID4=$!
              python scripts/build_taruki_viewer.py "$ifc" "output/taruki_${BASENAME}.html" &
              PID5=$!
              python scripts/build_neda_viewer.py "$ifc" "output/neda_${BASENAME}.html" &
              PID6=$!

              # 全完了を待つ
              wait $PID1 || echo "::warning::廻り縁拾い失敗: $BASENAME"
              wait $PID2 || echo "::warning::巾木拾い失敗: $BASENAME"
              wait $PID3 || echo "::warning::部材一覧Excel失敗: $BASENAME"
              wait $PID4 || echo "::warning::額縁拾い失敗: $BASENAME"
              wait $PID5 || echo "::warning::垂木拾い失敗: $BASENAME"
              wait $PID6 || echo "::warning::根太拾い失敗: $BASENAME"

              # 廻り縁・巾木・額縁の集計JSONを部材一覧Excelに統合
              if [ -f "output/buzai_${BASENAME}.xlsx" ]; then
                python scripts/add_sheets_to_excel.py "output/buzai_${BASENAME}.xlsx" || \
                  echo "::warning::Excel統合失敗: $BASENAME"
              fi

            done
          else
            echo "No IFC files to process (using cached outputs)"
          fi

          # 処理結果をキャッシュに保存
          mkdir -p output-cache
          cp -r output/* output-cache/ 2>/dev/null || true

      - name: Build site
        run: |
          # 静的ページをコピー（index.html含む全ページ）
          for f in pages/*.html; do
            [ -f "$f" ] || continue
            cp "$f" "output/$(basename "$f")"
          done

          # 旧ファイル名(mawari_*)がキャッシュに残っている場合は削除
          rm -f output/mawari_*.html 2>/dev/null || true

          # モデル別summary JSONマニフェストを生成（index/比較ツール用）
          python3 -c "
          import os, json, glob
          manifest = {'models': {}}
          for f in sorted(glob.glob('output/*_summary.json')):
              bn = os.path.basename(f)
              with open(f) as fh:
                  data = json.load(fh)
              model = data.get('model', bn.replace('_summary.json',''))
              tool = data.get('tool', '')
              if model not in manifest['models']:
                  manifest['models'][model] = {'files': {}}
              manifest['models'][model]['files'][tool] = bn
          with open('output/manifest.json', 'w') as fh:
              json.dump(manifest, fh, ensure_ascii=False, indent=2)
          print(f'Manifest: {len(manifest[\"models\"])} models')
          " || echo '{}' > output/manifest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
