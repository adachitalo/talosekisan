name: IFC → 廻り縁拾い3Dビューア

on:
  push:
    paths:
      - '*.ifc'
      - 'ifc/**'
      - 'pages/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      ifc_file:
        description: 'IFCファイル名（例: ifc/ie4d1_2023.ifc）空=全ファイル再生成'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore cached HTML outputs
        id: cache-html
        uses: actions/cache@v4
        with:
          path: output-cache
          key: ifc-html-${{ hashFiles('scripts/build_mawari_buchi_viewer.py') }}-${{ hashFiles('ifc/*.ifc', '*.ifc') }}
          restore-keys: |
            ifc-html-${{ hashFiles('scripts/build_mawari_buchi_viewer.py') }}-
            ifc-html-

      - name: Determine which IFC files to process
        id: find-ifc
        run: |
          mkdir -p output-cache

          # workflow_dispatch で指定された場合
          if [ -n "${{ github.event.inputs.ifc_file }}" ]; then
            echo "files=${{ github.event.inputs.ifc_file }}" >> $GITHUB_OUTPUT
            echo "mode=specified" >> $GITHUB_OUTPUT
            exit 0
          fi

          # スクリプト変更時は全ファイル再生成
          SCRIPT_CHANGED=$(git diff --name-only HEAD~1 HEAD -- scripts/ 2>/dev/null || echo "")
          if [ -n "$SCRIPT_CHANGED" ]; then
            FILES=$(find . -name '*.ifc' -not -path './.git/*' | tr '\n' ' ')
            echo "files=$FILES" >> $GITHUB_OUTPUT
            echo "mode=all (script changed)" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 変更されたIFCファイルのみ
          CHANGED_IFC=$(git diff --name-only HEAD~1 HEAD -- '*.ifc' 'ifc/*.ifc' 2>/dev/null || echo "")
          if [ -n "$CHANGED_IFC" ]; then
            echo "files=$CHANGED_IFC" >> $GITHUB_OUTPUT
            echo "mode=changed only" >> $GITHUB_OUTPUT
          else
            # pages/ のみの変更 → IFC処理不要、既存キャッシュ利用
            echo "files=" >> $GITHUB_OUTPUT
            echo "mode=pages-only (no IFC processing)" >> $GITHUB_OUTPUT
          fi

      - name: Process IFC files
        run: |
          mkdir -p output
          echo "Processing mode: ${{ steps.find-ifc.outputs.mode }}"

          # キャッシュから既存HTMLを復元
          if [ -d output-cache ]; then
            cp output-cache/*.html output/ 2>/dev/null || true
            echo "Restored $(ls output/*.html 2>/dev/null | wc -l) cached HTML files"
          fi

          IFC_FILES="${{ steps.find-ifc.outputs.files }}"

          if [ -n "$IFC_FILES" ]; then
            for ifc in $IFC_FILES; do
              if [ ! -f "$ifc" ]; then
                echo "::warning::ファイルが見つかりません: $ifc"
                continue
              fi

              BASENAME=$(basename "$ifc" .ifc)
              OUTPUT="output/${BASENAME}.html"

              echo "=== Processing: $ifc → $OUTPUT ==="
              python scripts/build_mawari_buchi_viewer.py "$ifc" "$OUTPUT"
            done
          else
            echo "No IFC files to process (using cached outputs)"
          fi

          # 処理結果をキャッシュに保存
          mkdir -p output-cache
          cp output/*.html output-cache/ 2>/dev/null || true

          # インデックスリンクを生成（outputにある全HTMLから）
          INDEX_LINKS=""
          for html in output/*.html; do
            [ -f "$html" ] || continue
            BASENAME=$(basename "$html" .html)
            [ "$BASENAME" = "index" ] && continue
            [ "$BASENAME" = "upload" ] && continue
            INDEX_LINKS="${INDEX_LINKS}<li><a href='${BASENAME}.html'>${BASENAME}</a></li>"
          done

          # アップロードページをコピー
          if [ -f "pages/upload.html" ]; then
            cp pages/upload.html output/upload.html
          fi

          # インデックスページを生成
          cat > output/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>TALO 積算ツール</title>
          <style>
          body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans",sans-serif;
          background:#0d1117;color:#e6edf3;max-width:600px;margin:40px auto;padding:0 20px}
          h1{color:#58a6ff;margin-bottom:4px}
          .sub{color:#8b949e;margin-bottom:24px;font-size:14px}
          .upload-btn{display:inline-block;background:#238636;color:#fff;text-decoration:none;
          padding:10px 20px;border-radius:6px;font-size:15px;margin-bottom:24px}
          .upload-btn:hover{background:#2ea043}
          h2{font-size:16px;color:#8b949e;border-bottom:1px solid #21262d;padding-bottom:8px;margin-top:24px}
          a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
          li{margin:10px 0;font-size:16px}
          .footer{color:#484f58;font-size:12px;margin-top:40px}
          </style></head>
          <body>
          <h1>TALO 積算ツール</h1>
          <p class="sub">IFCファイルから廻り縁拾い3Dビューアを自動生成</p>
          <a href="upload.html" class="upload-btn">📤 IFCファイルをアップロード</a>
          <h2>生成済みビューア</h2>
          HTMLEOF

          if [ -n "$INDEX_LINKS" ]; then
            echo "<ul>${INDEX_LINKS}</ul>" >> output/index.html
          else
            echo "<p style='color:#8b949e'>まだビューアがありません。IFCファイルをアップロードしてください。</p>" >> output/index.html
          fi

          cat >> output/index.html << 'HTMLEOF'
          <p class="footer">TALO International Inc. — Powered by GitHub Actions</p>
          </body></html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
